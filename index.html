<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rede Elas — Sprint 1</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="brand-name">Rede Elas</div>
      </div>

      <nav class="nav">
        <a href="#" class="nav-tab active">Início</a>
        <a href="#" class="nav-tab">Mural</a>
        <a href="#" class="nav-tab">Ajuda &amp; Denúncia</a>
      </nav>

      <button class="logout-btn" aria-label="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <div class="main-grid">
      <main>

        <form class="composer" id="formRelato">
          <input class="composer-input" type="text" placeholder="Compartilhe o seu relato aqui..." required />
          <button class="send-btn" type="submit">➤</button>
        </form>

        <section class="feed" id="feedRelatos">
        </section>
      </main>

      <aside class="sidebar">
        <h3 class="sidebar-title">Comunidades</h3>
        <div class="community-list">
          <div class="community-item">
            <span class="community-name">Comunidades</span>
          </div>
          <div class="community-item">
            <span class="community-name">Comunidades</span>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
